<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI 사주풀이 | 오늘의 사주</title>
  <meta name="description" content="생년월일시를 입력하면 AI가 사주팔자를 깊이 분석합니다."/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
  /* 한자 전용 폰트 */
  /* 텍스트 중간 한자 인라인 표시용 */
  .hanja-char {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC',
                 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW',
                 'Source Han Sans CN', 'SimSun', 'MingLiU', 'SimHei',
                 'MS Mincho', 'MS Gothic', 'UnBatang', 'UnDotum',
                 'Apple SD Gothic Neo', 'Heiti TC', 'STSong', 'FangSong', serif !important;
    font-size: inherit !important;
    display: inline !important;
    line-height: inherit;
  }
  /* 한자 선택기 버튼 전용 */
  .hanja-btn-char {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Serif KR',
                 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', serif !important;
    font-size: 20px !important;
    display: block !important;
    line-height: 1.4;
  }
  /* 한자 입력 필드 */
  .hanja-input, input.hanja-input {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Serif KR',
                 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', serif !important;
    font-size: 18px !important;
  }
  /* 한자 입력 필드 */
  #judge-hanja, #rename-hanja, #naming-surname-han,
  #hanja-manual-0, #hanja-manual-1, #hanja-manual-2,
  [id^="hanja-manual-"] {
    font-family: 'Noto Serif SC', 'Noto Sans SC', 'Noto Serif KR',
                 'SimSun', 'MS Mincho', 'Apple SD Gothic Neo', serif !important;
    font-size: 18px !important;
  }

  :root {
    --ink: #1a1008;
    --paper: #f5efe4;
    --gold: #c9913a;
    --red: #c0392b;
    --blue: #1a4a6b;
    --muted: #8a7860;
    --card: #fdf8f0;
    --border: #d9c9aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(201,145,58,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(192,57,43,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 9999;
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(245,239,228,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    flex-wrap: nowrap;
    overflow: hidden;
  }
  @media (max-width: 600px) {
    nav {
      flex-direction: column;
      align-items: flex-start;
      padding: 8px 12px;
      gap: 8px;
    }
  }
  .logo {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif;
    font-size: 22px; font-weight: 700;
    color: var(--ink);
    letter-spacing: 4px;
  }
  .logo span { color: var(--gold); }
  .nav-links {
    display: flex; gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
    max-width: 100%;
    flex-wrap: nowrap;
  }
  .nav-links::-webkit-scrollbar { display: none; }
  .nav-btn {
    background: none; border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 20px;
    font-size: 12px; cursor: pointer;
    color: var(--ink); transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--ink); color: var(--paper); }
  .nav-btn.primary { background: var(--gold); color: white; border-color: var(--gold); }
  .nav-btn.primary:hover { background: #a8742e; }

  /* ─── PAGES ─── */
  .page { display: none; min-height: 100vh; padding-top: 72px; position: relative; z-index: 1; }
  .page.active { display: block; }

  /* ─── HERO ─── */
  .hero {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: calc(100vh - 72px);
    text-align: center; padding: 60px 24px;
  }
  .hero-badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold); font-size: 11px; letter-spacing: 3px;
    padding: 6px 20px; border-radius: 20px; margin-bottom: 40px;
    text-transform: uppercase;
  }
  .hero h1 {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif;
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 700; line-height: 1.15;
    letter-spacing: -1px; margin-bottom: 24px;
    color: var(--ink);
  }
  .hero h1 em {
    font-style: normal; color: var(--gold);
    border-bottom: 3px solid var(--gold);
  }
  .hero p {
    font-size: 17px; color: var(--muted); max-width: 500px;
    line-height: 1.8; margin-bottom: 48px;
  }
  .hero-cta {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  }
  .btn-primary {
    background: var(--ink); color: var(--paper);
    border: none; padding: 16px 40px; border-radius: 4px;
    font-size: 15px; cursor: pointer; letter-spacing: 1px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: var(--gold); transform: translateY(-2px); }
  .btn-secondary {
    background: transparent; color: var(--ink);
    border: 1px solid var(--ink); padding: 16px 40px; border-radius: 4px;
    font-size: 15px; cursor: pointer; letter-spacing: 1px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--ink); color: var(--paper); }

  /* Decorative elements */
  .symbols {
    position: absolute; font-size: 120px; opacity: 0.04;
    font-family: serif; pointer-events: none; user-select: none;
  }
  .sym-1 { top: 15%; left: 5%; transform: rotate(-15deg); }
  .sym-2 { bottom: 20%; right: 6%; transform: rotate(10deg); }

  /* ─── FEATURES ─── */
  .features {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px; max-width: 1000px; margin: 60px auto; padding: 0 24px;
  }
  .feat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 32px 28px; text-align: center;
  }
  .feat-icon { font-size: 36px; margin-bottom: 16px; display: block; }
  .feat-card h3 { font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 18px; margin-bottom: 10px; }
  .feat-card p { font-size: 14px; color: var(--muted); line-height: 1.7; }

  /* ─── FORM ─── */
  .form-page { max-width: 600px; margin: 0 auto; padding: 48px 24px; }
  .form-title {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 30px;
    margin-bottom: 8px;
  }
  .form-sub { color: var(--muted); font-size: 14px; margin-bottom: 40px; line-height: 1.6; }

  .form-section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 28px; margin-bottom: 20px;
  }
  .form-section h3 {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 16px;
    margin-bottom: 20px; color: var(--gold);
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
  input, select, textarea {
    width: 100%; padding: 12px 14px;
    background: var(--paper); border: 1px solid var(--border);
    border-radius: 4px; font-size: 14px; color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--gold);
  }
  textarea { resize: vertical; min-height: 80px; }

  /* Gender toggle */
  .gender-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .gender-toggle button {
    flex: 1; padding: 12px; background: var(--paper);
    border: none; cursor: pointer; font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s; color: var(--muted);
  }
  .gender-toggle button.active { background: var(--ink); color: white; }

  .submit-btn {
    width: 100%; padding: 18px; background: var(--ink);
    color: var(--paper); border: none; border-radius: 4px;
    font-size: 16px; cursor: pointer; letter-spacing: 2px;
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif;
    transition: all 0.2s; margin-top: 8px;
  }
  .submit-btn:hover { background: var(--gold); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ─── MATCHES ─── */
  .matches-page { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
  .matches-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; flex-wrap: gap;
  }
  .matches-header h2 { font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 26px; }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .filter-chip {
    padding: 7px 18px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--paper);
    font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .filter-chip.active { background: var(--ink); color: white; border-color: var(--ink); }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
  .match-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .match-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
  .match-card-top {
    padding: 28px 24px 20px;
    background: linear-gradient(135deg, #1a1008 0%, #2d1f0e 100%);
    color: var(--paper); text-align: center; position: relative;
  }
  .match-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--gold); display: flex; align-items: center;
    justify-content: center; font-size: 28px; margin: 0 auto 12px;
    border: 3px solid rgba(255,255,255,0.2);
  }
  .match-name { font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 18px; margin-bottom: 4px; }
  .match-age { font-size: 13px; opacity: 0.7; }
  .compatibility-badge {
    position: absolute; top: 16px; right: 16px;
    background: var(--gold); color: white;
    padding: 4px 10px; border-radius: 12px;
    font-size: 13px; font-weight: 600;
  }
  .match-card-body { padding: 20px 24px; }
  .saju-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .saju-pill {
    text-align: center; padding: 8px 4px;
    border: 1px solid var(--border); border-radius: 4px;
  }
  .saju-pill .label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 2px; }
  .saju-pill .value { font-size: 13px; font-weight: 500; }
  .match-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag {
    font-size: 11px; padding: 3px 10px; border-radius: 12px;
    border: 1px solid var(--border); color: var(--muted);
  }
  .match-actions { display: flex; gap: 8px; }
  .action-btn {
    flex: 1; padding: 10px; border-radius: 4px; border: none;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .action-btn.like { background: var(--ink); color: white; }
  .action-btn.like:hover { background: var(--gold); }
  .action-btn.skip { background: var(--paper); color: var(--muted); border: 1px solid var(--border); }

  /* ─── CHAT ─── */
  .chat-page { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
  .chat-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .chat-item {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px; background: var(--card);
    border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; transition: all 0.2s;
  }
  .chat-item:hover { border-color: var(--gold); }
  .chat-item-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--ink); display: flex; align-items: center;
    justify-content: center; font-size: 22px; flex-shrink: 0;
  }
  .chat-item-info { flex: 1; }
  .chat-item-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .chat-item-preview { font-size: 13px; color: var(--muted); }
  .chat-item-time { font-size: 12px; color: var(--muted); }

  .chat-window {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .chat-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .chat-messages {
    height: 380px; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 70%; }
  .msg.me { align-self: flex-end; }
  .msg.them { align-self: flex-start; }
  .msg-bubble {
    padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6;
  }
  .msg.me .msg-bubble { background: var(--ink); color: white; border-radius: 16px 16px 4px 16px; }
  .msg.them .msg-bubble { background: var(--paper); border: 1px solid var(--border); border-radius: 16px 16px 16px 4px; }
  .msg-time { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .msg.me .msg-time { text-align: right; }
  .chat-input-row {
    padding: 16px; border-top: 1px solid var(--border);
    display: flex; gap: 12px; align-items: center;
  }
  .chat-input {
    flex: 1; padding: 12px 16px; border: 1px solid var(--border);
    border-radius: 24px; background: var(--paper); font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .send-btn {
    padding: 12px 20px; background: var(--ink); color: white;
    border: none; border-radius: 24px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s;
  }
  .send-btn:hover { background: var(--gold); }

  /* ─── AI ANALYSIS ─── */
  .analysis-box {
    background: linear-gradient(135deg, #1a1008, #2d1f0e);
    border-radius: 8px; padding: 28px; color: var(--paper);
    margin-bottom: 20px;
  }
  .analysis-box h3 { font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 18px; margin-bottom: 16px; color: var(--gold); }
  .analysis-text { font-size: 14px; line-height: 2; opacity: 0.9; }
  .analysis-loading {
    display: flex; align-items: center; gap: 12px;
    font-size: 14px; opacity: 0.7;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .compat-meter {
    display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .compat-item { flex: 1; min-width: 120px; }
  .compat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .compat-bar {
    height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
  }
  .compat-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
  .compat-fill.high { background: #27ae60; }
  .compat-fill.mid { background: var(--gold); }
  .compat-fill.low { background: var(--red); }
  .compat-pct { font-size: 13px; font-weight: 600; margin-top: 4px; }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--paper); border-radius: 12px;
    width: 100%; max-width: 640px; max-height: 90vh;
    overflow-y: auto; position: relative;
  }
  .modal-header {
    padding: 24px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h3 { font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 20px; }
  .close-btn {
    background: none; border: 1px solid var(--border);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 16px; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-body { padding: 28px; }

  /* ─── ALERTS ─── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: white;
    padding: 14px 28px; border-radius: 4px;
    font-size: 14px; z-index: 300;
    transition: transform 0.3s; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .menu-item { display:block; width:100%; padding:10px 16px; background:none; border:none; text-align:left; font-size:14px; font-family:'Noto Sans KR',sans-serif; color:var(--ink); cursor:pointer; border-radius:8px; }
  .menu-item:hover { background:var(--card); color:var(--gold); }

  /* Divider */
  .divider {
    text-align: center; position: relative; margin: 32px 0;
    color: var(--muted); font-size: 12px; letter-spacing: 2px;
  }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: 50%;
    width: 40%; height: 1px; background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  /* Stats */
  .stats-row {
    display: flex; gap: 40px; justify-content: center;
    padding: 40px 24px; border-top: 1px solid var(--border);
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 32px;
    color: var(--gold); display: block; margin-bottom: 4px;
  }
  .stat-label { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

  /* ─── SAJU READING ─── */
  .saju-reading-page { max-width: 780px; margin: 0 auto; padding: 48px 24px; }
  .saju-input-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 36px 32px; margin-bottom: 32px;
  }
  .saju-input-card h2 { font-family:'Noto Serif SC','Noto Serif KR',serif; font-size:26px; margin-bottom:6px; }
  .saju-input-card p { color:var(--muted); font-size:14px; margin-bottom:28px; line-height:1.7; }
  .saju-birth-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px; margin-bottom:16px; }

const HEAVENLY_STEMS  = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];

const EB_KOR  = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
const SOLAR_TERMS_DAY = [6,4,6,5,6,6,7,7,8,8,7,7];

const DAY_MASTER_DESC = {
  甲:'갑목(甲木) — 곧게 자라는 큰 나무, 리더십과 진취성',
  乙:'을목(乙木) — 유연하게 뻗는 풀과 덩굴, 적응력과 친화력',
  丙:'병화(丙火) — 타오르는 태양, 열정과 카리스마',
  丁:'정화(丁火) — 은은한 촛불, 섬세함과 예술성',

  壬:'임수(壬水) — 드넓은 바다, 지혜와 포용',
  癸:'계수(癸水) — 맑은 샘물, 감수성과 직관력'
};

function calcYearPillar(year) {
  const hs = ((year - 4) % 10 + 10) % 10;
  const eb = ((year - 4) % 12 + 12) % 12;
  return { hs, eb, heavenly: HEAVENLY_STEMS[hs], earthly: EARTHLY_BRANCHES[eb],
    element: HS_ELEM[hs], description: HS_KOR[hs]+'년 '+EB_KOR[eb]+'년' };
}

function calcMonthPillar(year, month, day) {
  // 기준점법: 1900년 2월(입춘이후) = 戊寅(hs=4,eb=2)
  const stDay = SOLAR_TERMS_DAY[month - 1];
  let m = (day >= stDay) ? month : month - 1;
  let y = year;
  if (m === 0) { m = 12; y--; }
  const totalMonths = (y - 1900) * 12 + (m - 2);
  const hs = ((4 + totalMonths) % 10 + 10) % 10;
  const eb = ((2 + totalMonths) % 12 + 12) % 12;
  return { hs, eb, heavenly: HEAVENLY_STEMS[hs], earthly: EARTHLY_BRANCHES[eb],
    element: HS_ELEM[hs], description: HS_KOR[hs]+'월 '+EB_KOR[eb]+'월' };
}

function calcDayPillar(year, month, day) {
  // 기준: 1900-01-01 = 甲戌(hs=0,eb=10)
  const base   = new Date(1900, 0, 1);
  const target = new Date(year, month - 1, day);
  const diff   = Math.round((target - base) / 86400000);
  const hs = ((diff % 10) + 10) % 10;
  const eb = (((diff + 10) % 12) + 12) % 12;
  return { hs, eb, heavenly: HEAVENLY_STEMS[hs], earthly: EARTHLY_BRANCHES[eb],
    element: HS_ELEM[hs], description: HS_KOR[hs]+'일 '+EB_KOR[eb]+'일' };
}

function calcTimePillar(dayHs, timeName) {
  const timeMap = {자시:0,축시:1,인시:2,묘시:3,진시:4,사시:5,오시:6,미시:7,신시:8,유시:9,술시:10,해시:11,모름:-1};
  const ti = timeMap[timeName] ?? -1;
  if (ti < 0) return { hs:-1, eb:-1, heavenly:'?', earthly:'?', element:'미상', description:'시간 미입력' };
  const baseHs = [0,2,4,6,8][dayHs % 5];
  const hs = (baseHs + ti) % 10;
  const eb = ti % 12;
  return { hs, eb, heavenly: HEAVENLY_STEMS[hs], earthly: EARTHLY_BRANCHES[eb],
    element: HS_ELEM[hs], description: HS_KOR[hs]+'시 '+EB_KOR[eb]+'시' };
}



// ─── 음력→양력 변환 (한국천문연구원 공공API) ───

async function lunarToSolar(lunarYear, lunarMonth, lunarDay, isLeap) {
  try {
    const leapParam = isLeap ? 'Y' : 'N';
    const lunMonth = String(lunarMonth).padStart(2,'0');
    const lunDay   = String(lunarDay).padStart(2,'0');
    // Netlify 함수를 통해 KASI API 호출 (CORS 우회)
    const res = await fetch('https://fastidious-pika-aa8092.netlify.app/.netlify/functions/lunar', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ lunYear: lunarYear, lunMonth, lunDay, leapMonth: leapParam })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return { year: data.solYear, month: data.solMonth, day: data.solDay };
  } catch(e) {
    console.warn('음력 변환 실패, 근사값 사용:', e.message);
    return approximateLunarToSolar(lunarYear, lunarMonth, lunarDay, isLeap);
  }
}

// 공공API 없을 때 사용하는 근사 변환 (기준일 기반)
function approximateLunarToSolar(ly, lm, ld, isLeap) {
  const bases = {
    1960:[1,28],1961:[2,15],1962:[2,5],1963:[1,25],1964:[2,13],
    1965:[2,2],1966:[1,21],1967:[2,9],1968:[1,30],1969:[2,17],
    1970:[2,6],1971:[1,27],1972:[2,15],1973:[2,3],1974:[1,23],
    1975:[2,11],1976:[1,31],1977:[2,18],1978:[2,7],1979:[1,28],
    1980:[2,16],1981:[2,5],1982:[1,25],1983:[2,13],1984:[2,2],
    1985:[2,20],1986:[2,9],1987:[1,29],1988:[2,17],1989:[2,6],
    1990:[1,27],1991:[2,15],1992:[2,4],1993:[1,23],1994:[2,10],
    1995:[1,31],1996:[2,19],1997:[2,7],1998:[1,28],1999:[2,16],
    2000:[2,5],2001:[1,24],2002:[2,12],2003:[2,1],2004:[1,22],
    2005:[2,9],2006:[1,29],2007:[2,18],2008:[2,7],2009:[1,26],
    2010:[2,14],2011:[2,3],2012:[1,23],2013:[2,10],2014:[1,31],
    2015:[2,19],2016:[2,8],2017:[1,28],2018:[2,16],2019:[2,5],
    2020:[1,25],2021:[2,12],2022:[2,1],2023:[1,22],2024:[2,10],
    2025:[1,29],2026:[2,17],2027:[2,6],2028:[1,26],2029:[2,13],
  };
  const base = bases[ly];
  if (!base) return { year: ly, month: lm, day: ld };
  const baseDate = new Date(ly, base[0]-1, base[1]);
  // 월당 평균 29.53일로 근사
  let offset = Math.round((lm-1) * 29.53);
  if (isLeap) offset += 29;
  offset += ld - 1;
  const solar = new Date(baseDate.getTime() + offset * 86400000);
  return { year: solar.getFullYear(), month: solar.getMonth()+1, day: solar.getDate() };
}

function calcSaju(year, month, day, timeName) {
  const yp = calcYearPillar(year);
  const mp = calcMonthPillar(year, month, day);
  const dp = calcDayPillar(year, month, day);
  const tp = calcTimePillar(dp.hs, timeName);

  // 오행 분포 (천간15 지지10 가중)
  const elemCount = { 목:0, 화:0, 토:0, 금:0, 수:0 };
  [yp, mp, dp, tp].forEach(p => {
    if (p.hs >= 0) {
      elemCount[HS_ELEM[p.hs]] = (elemCount[HS_ELEM[p.hs]] || 0) + 15;
      elemCount[EB_ELEM[p.eb]] = (elemCount[EB_ELEM[p.eb]] || 0) + 10;
    }
  });
  const total = Object.values(elemCount).reduce((a,b)=>a+b,0) || 1;
  const elements = {};
  Object.entries(elemCount).forEach(([k,v]) => elements[k] = Math.round(v/total*100));

  const dayMasterDesc = DAY_MASTER_DESC[dp.heavenly] || `일간 ${dp.heavenly}`;

  return { yp, mp, dp, tp,
    year: yp, month: mp, day: dp, time: tp,  // buildSajuTable 호환용 별칭
    elements, daymaster: dayMasterDesc };
}

    const strongEl = Object.entries(elements).sort((a,b)=>b[1]-a[1])[0][0];
    const dayH = calcPillars.dp.heavenly;
    const dayE = calcPillars.dp.earthly;
    const dayElem = calcPillars.dp.element;
    renderSajuResult({
      pillars: calcPillars, elements, daymaster: dayMasterDesc,
      characterTitle: `${dayH}${dayE} ${dayElem} 기운의 사주`,
      characterSummary: `일간 ${dayH}(${dayElem}) 기운을 타고난 사주입니다. ${strongEl} 기운이 ${elements[strongEl]}%로 가장 강하며, ${weakEl} 기운이 상대적으로 부족합니다. ${dayMasterDesc}`,
      lifeType:'대기만성형',
      decades:[
        {range:'10대',ageRange:'~19세',trend:'저점',score:({목:55,화:60,토:50,금:65,수:58}[dayElem]||55),emoji:'📉',title:'성장기',description:`${dayMasterDesc.split('—')[0].trim()} 기운이 형성되는 시기. ${strongEl} 기운이 내면 발달을 이끈다.`},
        {range:'20대',ageRange:'20~29세',trend:'평탄',score:({목:70,화:75,토:65,금:72,수:68}[dayElem]||68),emoji:'➡️',title:'준비기',description:`${dayH} 일간의 특성이 드러나기 시작. 방향을 찾아가는 준비기.`},
        {range:'30대',ageRange:'30~39세',trend:'상승',score:({목:80,화:88,토:75,금:82,수:78}[dayElem]||78),emoji:'📈',title:'도약기',description:`${strongEl} 기운이 활성화되며 능력을 인정받는 시기.`},
        {range:'40대',ageRange:'40~49세',trend:'고점',score:({목:85,화:82,토:88,금:90,수:85}[dayElem]||85),emoji:'🚀',title:'결실기',description:`사주 핵심 기운이 완숙해지는 때. ${dayElem} 오행이 꽃을 피운다.`},
        {range:'50대',ageRange:'50~59세',trend:'고점',score:({목:75,화:70,토:85,금:80,수:88}[dayElem]||78),emoji:'🔥',title:'황금기',description:`인생의 정점. ${weakEl} 기운 보완으로 더욱 빛나는 시기.`},
        {range:'60대',ageRange:'60~69세',trend:'유지',score:({목:65,화:60,토:72,금:68,수:72}[dayElem]||65),emoji:'➡️',title:'안정기',description:`축적된 ${dayElem} 기운으로 안정적 영향력 유지.`},
        {range:'70대+',ageRange:'70세~',trend:'관리',emoji:'📉',title:'관리기',description:`${weakEl} 기운 보충이 건강의 핵심. 내실을 지키는 시기.`},
      ],
      career:{good:'전문성과 기술력을 살리는 분야',watchOut:'유연함이 곧 성공의 열쇠',caution:'동업은 신중하게'},
      money:{flow:'중년 이후로 갈수록 강해지는 금전운',caution:'투기보다 안정적 자산 관리'},
      health:{weakPoints:'오행 불균형으로 인한 신체 주의',caution:'스트레스 관리 필수',tip:'규칙적 운동과 명상 추천'},
      thisYearTitle:`${currentYear}년 ${dayH}일간의 운세`,
      thisYearOverview:`${currentYear}년은 ${dayElem} 기운과 세운의 상호작용이 활발한 해. ${strongEl} 기운을 살려 나아가세요.`,
      thisYearCareer:`${dayElem} 기운이 직업운에 긍정적으로 작용. 전문성을 높이는 시기.`,
      thisYearLove:`${weakEl} 기운을 보완해주는 인연을 만날 가능성. 진솔한 소통이 핵심.`,
      thisYearMoney:`상반기 기반 다지기, 하반기 ${strongEl} 기운으로 실속 챙기기.`,
      thisYearCaution:`${weakEl} 기운 부족으로 건강·대인관계 주의.`,
      closingMessage:`${dayH}${dayE} 일주를 타고난 당신은 특별한 기질을 지녔습니다. ${currentYear}년 ${strongEl} 기운이 당신을 빛나게 해줄 것입니다.`,
      idealPartner:{element:`${weakEl} 기운`,description:`${weakEl} 기운이 강한 파트너가 부족한 면을 채워줍니다. ${dayElem}과 ${weakEl}의 조화로 균형잡힌 관계를 이룰 수 있어요.`,
        traits:['안정감 있는 사람','신뢰할 수 있는 사람',`${weakEl} 기운이 강한 사람`,'현실적인 사람'],
        avoid:`같은 ${strongEl} 기운이 과하게 겹치면 마찰이 생깁니다.`}
    }, year, month, day, time, age, currentYear);
  }

  btn.disabled = false; btn.textContent = '✦ 다시 분석하기';
}

function renderSajuResult(r, year, month, day, time, age, currentYear) {
  // pillars 안전 보장
  if (!r.pillars || !r.pillars.day) {
    document.getElementById('saju-result').innerHTML =
      `<div style="background:#fff3f3;border:1px solid #e74c3c;border-radius:8px;padding:16px;font-size:14px;color:#c0392b;">⚠️ 사주 계산 중 오류가 발생했습니다. 생년월일을 다시 확인해 주세요.</div>`;
    return;
  }
  const pillarNames  = ['time','day','month','year'];
  const pillarLabels = ['시주(時柱)','일주(日柱)','월주(月柱)','년주(年柱)'];
  const elemColors = { 목:'e-wood', 화:'e-fire', 토:'e-earth', 금:'e-metal', 수:'e-water' };
  const trendScore = { '고점':95,'상승':82,'평탄':65,'유지':70,'저점':45,'관리':55 };

  const elemEmojiMap = { 목:'🌿', 화:'🔥', 토:'🏔️', 금:'💎', 수:'🌊' };
  const elemColorMap = { 목:'#2e7d32', 화:'#c62828', 토:'#f57f17', 금:'#6d4c41', 수:'#1565c0' };
  const elemBgMap    = { 목:'rgba(46,125,50,0.1)', 화:'rgba(198,40,40,0.1)', 토:'rgba(245,127,23,0.1)', 금:'rgba(109,76,65,0.1)', 수:'rgba(21,101,192,0.1)' };

  const pillarsHTML = pillarNames.map((k,i) => {
    const p = r.pillars[k];
    if (!p || p.hs < 0) return '';
    const hsEl = HS_ELEM[p.hs]; const ebEl = EB_ELEM[p.eb];
    return `<div class="pillar-block" style="background:${elemBgMap[hsEl]||'rgba(0,0,0,0.03)'};border-color:${elemColorMap[hsEl]||'var(--border)'};">
      <div class="pillar-label">${pillarLabels[i]}</div>
      <div class="pillar-heavenly" style="color:${elemColorMap[hsEl]||'var(--ink)'};">${p.heavenly}</div>
      <div class="pillar-earthly" style="color:${elemColorMap[ebEl]||'var(--muted)'};">${p.earthly}</div>
      <div class="pillar-element" style="font-size:11px;margin-top:4px;">
        <span style="color:${elemColorMap[hsEl]};">${elemEmojiMap[hsEl]}${hsEl}</span>
        <span style="color:var(--muted);"> / </span>
        <span style="color:${elemColorMap[ebEl]};">${elemEmojiMap[ebEl]}${ebEl}</span>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px;">${p.description}</div>
    </div>`;
  }).join('');

  const maxElem = Math.max(...Object.values(r.elements));
  const elemHTML = Object.entries(r.elements).map(([k,v]) => `
    <div class="element-bar-item">
      <div class="element-bar-label">${elemEmojiMap[k]} ${k}</div>
      <div class="element-bar-wrap">
        <div class="element-bar-fill ${elemColors[k]}" style="height:${Math.round(v/maxElem*100)}%"></div>
      </div>
      <div class="element-bar-pct">${v}%</div>
    </div>`).join('');

  const decadeHTML = (r.decades||[]).map((d,i) => {
    const isCurrent = (i===0&&age<20)||(i===1&&age>=20&&age<30)||(i===2&&age>=30&&age<40)||
                      (i===3&&age>=40&&age<50)||(i===4&&age>=50&&age<60)||(i===5&&age>=60&&age<70)||(i===6&&age>=70);
    const score = d.score || trendScore[d.trend] || 70;
    const scoreColor = score>=85?'#27ae60':score>=65?'#c9913a':'#c0392b';
    return `<div class="decade-item">
      <div class="decade-marker">
        <div class="decade-dot ${isCurrent?'current':'future'}"></div>
        ${i<(r.decades.length-1)?'<div class="decade-line"></div>':''}
      </div>
      <div class="decade-content ${isCurrent?'current-decade':''}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <span style="font-size:20px;">${d.emoji||'📅'}</span>
          <span class="decade-range">${d.range} (${d.ageRange}) ${isCurrent?'<span style="color:var(--gold);font-size:11px;">← 현재</span>':''}</span>
        </div>
        <div class="decade-title">${d.title}</div>
        <div class="decade-score-bar"><div class="decade-score-fill" style="width:${score}%;background:${scoreColor}"></div></div>
        <div class="decade-desc">${d.description}</div>
      </div>
    </div>`;
  }).join('');

  const thisYearItems = [
    {icon:'💼',label:'직업 & 사업운',content:r.thisYearCareer},
    {icon:'💕',label:'연애 & 인간관계',content:r.thisYearLove},
    {icon:'💰',label:'금전운',content:r.thisYearMoney},
    {icon:'⚠️',label:'올해 주의사항',content:r.thisYearCaution},
  ].filter(x=>x.content);

  const thisYearHTML = thisYearItems.map(item=>`
    <div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.1);">
      <span style="font-size:20px;flex-shrink:0;">${item.icon}</span>
      <div>
        <div style="font-size:11px;letter-spacing:1px;opacity:0.6;margin-bottom:4px;">${item.label}</div>
        <div style="font-size:14px;line-height:1.8;opacity:0.92;">${item.content}</div>
      </div>
    </div>`).join('');

  const traitTagsHTML = (r.idealPartner?.traits||[]).map(t=>`<span class="ideal-tag">${t}</span>`).join('');

  document.getElementById('saju-result').innerHTML = `
    <div class="sr-section">
      <div class="sr-section-title"><div class="title-icon">🌟</div>
        <div><div>타고난 캐릭터</div>
          <div style="font-size:13px;font-weight:400;color:var(--muted);margin-top:2px;">${r.daymaster||''}</div>
        </div>
      </div>
      <div style="background:linear-gradient(135deg,#1a1008,#2d1f0e);border-radius:12px;padding:24px;color:var(--paper);margin-bottom:16px;">
        <div style="font-size:22px;font-family:'Noto Serif SC','Noto Serif KR',serif;font-weight:700;margin-bottom:12px;">✦ ${r.characterTitle||'나의 사주 캐릭터'}</div>
        <p style="font-size:14px;line-height:2;opacity:0.88;">${r.characterSummary||''}</p>
        ${r.lifeType?`<div style="margin-top:14px;display:inline-block;background:rgba(201,145,58,0.25);border-radius:20px;padding:5px 16px;font-size:12px;color:#f5c97a;">🗺️ ${r.lifeType}</div>`:''}
      </div>
      <div style="font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;">사주팔자 (${year}년 ${month}월 ${day}일 ${time} · ${sajuGender})</div>
      ${buildSajuTable(r.pillars, sajuGender)}
      <div class="pillars-display">${pillarsHTML}</div>
      <div style="font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;margin-top:4px;">오행 분포</div>
      <div class="elements-chart">${elemHTML}</div>
    </div>

    <div class="sr-section">
      <div class="sr-section-title"><div class="title-icon">📅</div><span>100세까지의 인생 그래프</span></div>
      <div class="decade-timeline">${decadeHTML}</div>
    </div>

    <div class="sr-section">
      <div class="sr-section-title"><div class="title-icon">💡</div><span>사업 · 금전 · 건강 핵심 가이드</span></div>
      ${r.career?`<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;">
        <div style="background:rgba(201,145,58,0.1);padding:12px 18px;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:1px;">💼 사업 & 직업</div>
        <div style="padding:16px 18px;display:flex;flex-direction:column;gap:12px;">
          <div><span style="font-size:11px;color:#27ae60;font-weight:600;">✅ 잘되는 부분</span><p style="margin:4px 0 0;font-size:14px;line-height:1.8;">${r.career.good}</p></div>
          <div><span style="font-size:11px;color:var(--gold);font-weight:600;">🔑 놓치지 말 것</span><p style="margin:4px 0 0;font-size:14px;line-height:1.8;">${r.career.watchOut}</p></div>
          <div><span style="font-size:11px;color:#c0392b;font-weight:600;">⚠️ 조심할 점</span><p style="margin:4px 0 0;font-size:14px;line-height:1.8;">${r.career.caution}</p></div>
        </div></div>`:''}
      ${r.money?`<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;">
        <div style="background:rgba(201,145,58,0.1);padding:12px 18px;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:1px;">💰 금전</div>
        <div style="padding:16px 18px;display:flex;flex-direction:column;gap:12px;">
          <div><span style="font-size:11px;color:#27ae60;font-weight:600;">📈 흐름</span><p style="margin:4px 0 0;font-size:14px;line-height:1.8;">${r.money.flow}</p></div>
          <div><span style="font-size:11px;color:#c0392b;font-weight:600;">⚠️ 조심할 점</span><p style="margin:4px 0 0;font-size:14px;line-height:1.8;">${r.money.caution}</p></div>
        </div></div>`:''}
      ${r.health?`<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;">
        <div style="background:rgba(201,145,58,0.1);padding:12px 18px;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:1px;">🏥 건강</div>
        <div style="padding:16px 18px;display:flex;flex-direction:column;gap:12px;">
          <div><span style="font-size:11px;color:#c0392b;font-weight:600;">🩺 주의 부위</span><p style="margin:4px 0 0;font-size:14px;line-height:1.8;">${r.health.weakPoints}</p></div>
          <div><span style="font-size:11px;color:var(--gold);font-weight:600;">⚠️ 조심할 점</span><p style="margin:4px 0 0;font-size:14px;line-height:1.8;">${r.health.caution}</p></div>
          <div><span style="font-size:11px;color:#27ae60;font-weight:600;">💚 추천 습관</span><p style="margin:4px 0 0;font-size:14px;line-height:1.8;">${r.health.tip}</p></div>
        </div></div>`:''}
    </div>

    <div class="sr-section">
      <div class="sr-section-title"><div class="title-icon">🐉</div><span>${currentYear}년 운세</span></div>
      <div style="background:linear-gradient(135deg,#1a1008,#2d1f0e);border-radius:12px;padding:24px;color:var(--paper);">
        <div style="font-size:18px;font-family:'Noto Serif SC','Noto Serif KR',serif;font-weight:700;margin-bottom:16px;">${r.thisYearTitle||currentYear+'년 운세'}</div>
        <p style="font-size:14px;line-height:2;opacity:0.88;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1);">${r.thisYearOverview||''}</p>
        ${thisYearHTML}
      </div>
    </div>

    <div class="sr-section">
      <div class="sr-section-title"><div class="title-icon">💕</div><span>나와 잘 맞는 인연</span></div>
      <div class="ideal-partner-card">
        <h4>잘 맞는 오행 · ${r.idealPartner?.element||''}</h4>
        <p>${r.idealPartner?.description||''}</p>
        <div style="margin-bottom:16px;">
          <div style="font-size:12px;opacity:0.6;margin-bottom:10px;letter-spacing:1px;">이런 사람과 잘 맞아요</div>
          <div class="ideal-tags">${traitTagsHTML}</div>
        </div>
        <div style="border-top:1px solid rgba(255,255,255,0.12);padding-top:14px;font-size:13px;opacity:0.7;">🚫 ${r.idealPartner?.avoid||''}</div>
      </div>
      <div style="margin-top:16px;">
        <button class="submit-btn" data-page="compat">💑 궁합 보러 가기 →</button>
      </div>
    </div>

    ${r.closingMessage?`<div class="sr-section">
      <div style="background:linear-gradient(135deg,rgba(201,145,58,0.12),rgba(201,145,58,0.04));border:1px solid rgba(201,145,58,0.3);border-radius:12px;padding:24px;text-align:center;">
        <div style="font-size:24px;margin-bottom:12px;">💌</div>
        <p style="font-size:15px;line-height:2;color:var(--ink);font-style:italic;">${r.closingMessage}</p>
      </div>
    </div>`:''}
  `;

}

// ─── TOAST ───

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// ─── FORTUNE (오늘의 운세 / 내일의 운세) ───
let fortuneDay = 'today'; // 'today' or 'tomorrow'

function setFortuneDay(day) {
  fortuneDay = day;
  const isToday = day === 'today';

  // 탭 스타일
  const todayTab = document.getElementById('fortune-today-tab');
  const tomorrowTab = document.getElementById('fortune-tomorrow-tab');
  if (todayTab) {
    todayTab.style.background = isToday ? 'var(--gold)' : 'var(--card)';
    todayTab.style.color = isToday ? 'white' : 'var(--ink)';
    todayTab.style.borderColor = isToday ? 'var(--gold)' : 'var(--border)';
  }
  if (tomorrowTab) {
    tomorrowTab.style.background = !isToday ? 'var(--gold)' : 'var(--card)';
    tomorrowTab.style.color = !isToday ? 'white' : 'var(--ink)';
    tomorrowTab.style.borderColor = !isToday ? 'var(--gold)' : 'var(--border)';
  }

  // 버튼 & 제목 변경
  const btn = document.getElementById('fortune-submit-btn');
  const title = document.getElementById('fortune-page-title');
  if (btn) btn.textContent = isToday ? '🌅 오늘의 운세 보기 ✦' : '🌙 내일의 운세 보기 ✦';
  if (title) title.textContent = isToday ? '오늘의 운세' : '내일의 운세';

  // 결과 초기화
  const content = document.getElementById('fortune-content');
  if (content) content.style.display = 'none';
}


function autoFillPage() {
  if (!myProfile) return;
  const { year, month, day, time, gender, calType, isLeap, name } = myProfile;
  // saju
  const sy = document.getElementById('saju-year');
  const sm = document.getElementById('saju-month');
  const sd = document.getElementById('saju-day');
  const st = document.getElementById('saju-time');
  if (sy) sy.value = year;
  if (sm) sm.value = month;
  if (sd) sd.value = day;
  if (st) st.value = time;
  // compat
  const cy = document.getElementById('c-my-year');
  const cm = document.getElementById('c-my-month');
  const cd = document.getElementById('c-my-day');
  const ct = document.getElementById('c-my-time');
  if (cy) cy.value = year;
  if (cm) cm.value = month;
  if (cd) cd.value = day;
  if (ct) ct.value = time;
  const note = document.getElementById('saju-autofill-note') || document.getElementById('compat-autofill-note');
  if (note && name) {
    note.style.display = 'flex';
    note.innerHTML = `✅ ${name}님의 생년월일이 자동 입력됐어요`;
  }
}
document.addEventListener('DOMContentLoaded', autoFillPage);


function toggleMenu() {
  const menu = document.getElementById('nav-menu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}
document.addEventListener('click', function(e) {
  const menu = document.getElementById('nav-menu');
  const btn = document.getElementById('menu-btn');
  if (menu && !menu.contains(e.target) && e.target !== btn) menu.style.display = 'none';
});

</script>
