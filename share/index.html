<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>공유된 결과 | 오늘의 사주</title>
  <meta name="description" content="AI가 분석한 사주·운세·궁합 결과를 확인하세요."/>
  <meta property="og:title" content="오늘의 사주 결과 공유"/>
  <meta property="og:description" content="AI 사주·운세·궁합 결과를 확인해보세요!"/>
  <meta property="og:image" content="https://saju-today.com/og-image.png"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0e0b14; --bg2:#13101c; --bg3:#1a1628; --gold:#c9a84c; --gold-light:#e8c96a; --text:#f0ead6; --text2:#a89c80; --border:rgba(201,168,76,0.12); --border2:rgba(255,255,255,0.06); }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:220px; }
    @keyframes twinkle { 0%,100%{opacity:0.25;transform:scale(1)} 50%{opacity:0.9;transform:scale(1.4)} }

    /* 헤더 */
    .header { background:linear-gradient(135deg,#0e0b14,#1a1628); border-bottom:1px solid var(--border); padding:28px 24px; text-align:center; }
    .logo { font-family:'Noto Serif KR',serif; font-size:28px; font-weight:700; color:var(--text); cursor:pointer; }
    .logo span { color:var(--gold); }
    .header-sub { color:var(--text2); font-size:13px; margin-top:6px; }
    .share-badge { display:inline-block; background:var(--gold-dim,rgba(201,168,76,0.15)); border:1px solid rgba(201,168,76,0.4); color:var(--gold-light); font-size:11px; font-weight:700; padding:4px 14px; border-radius:20px; margin-top:12px; letter-spacing:0.5px; }

    /* 콘텐츠 */
    .container { max-width:640px; margin:0 auto; padding:24px 16px; }
    .result-wrapper { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:24px; box-shadow:0 2px 24px rgba(0,0,0,0.3); overflow:hidden; }
    .result-meta { display:flex; align-items:center; gap:10px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); }
    .result-icon { font-size:30px; }
    .result-meta-text strong { display:block; font-size:17px; font-weight:700; color:var(--text); }
    .result-meta-text span { font-size:12px; color:var(--text2); }

    /* 로딩 */
    .loading { text-align:center; padding:64px 20px; color:var(--text2); }
    .spinner { width:38px; height:38px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* 하단 고정 CTA */
    .cta-fixed { position:fixed; bottom:0; left:0; right:0; background:rgba(14,11,20,0.97); backdrop-filter:blur(20px); border-top:1px solid var(--border); padding:20px 20px max(20px,env(safe-area-inset-bottom)); }
    .cta-text { color:var(--text2); font-size:13px; text-align:center; margin-bottom:12px; }
    .cta-btn { display:block; text-align:center; background:linear-gradient(45deg,#c9913a,#e8b56a); color:white; font-size:15px; font-weight:700; padding:14px; border-radius:14px; text-decoration:none; font-family:'Noto Serif KR',serif; box-shadow:0 4px 16px rgba(201,145,58,0.35); margin-bottom:14px; }

    /* 공유 버튼 행 */
    .share-row { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
    .share-row-label { text-align:center; font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:8px; }
    .share-btn { display:inline-flex; align-items:center; gap:6px; padding:10px 16px; border:none; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Noto Sans KR',sans-serif; }
    .btn-kakao { background:#FEE500; color:#191919; }
    .btn-twitter { background:#000; color:white; }
    .btn-instagram { background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color:white; }
  </style>
</head>
<body>

<div class="header" onclick="location.href='https://saju-today.com'">
  <div class="logo">오늘의<span>사주</span></div>
  <div class="header-sub">AI 사주·운세·궁합</div>
  <div class="share-badge">🔮 공유된 결과</div>
</div>

<div class="container">
  <div id="content-area">
    <div class="loading">
      <div class="spinner"></div>
      <p>결과를 불러오는 중...</p>
    </div>
  </div>
</div>

<div class="cta-fixed">
  <div class="cta-text">🔮 나도 AI 사주·운세 무료로 보기</div>
  <a href="https://saju-today.com" class="cta-btn">✨ 오늘의 사주 무료로 보기</a>
  <div class="share-row-label">각 플랫폼에서 링크를 공유하세요!</div>
  <div class="share-row">
    <button class="share-btn btn-kakao" onclick="shareKakao()">💬 카카오톡</button>
    <button class="share-btn btn-twitter" onclick="shareTwitter()">🐦 트위터</button>
    <button class="share-btn btn-instagram" onclick="shareInstagram()">📸 인스타그램</button>
  </div>
</div>

<script>
(async function() {
  const SUPABASE_URL = 'https://kuupemfzqkzinrauhpnd.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_4KkeyDEpIaQywyNfD1Eksw_FHJ6zIIx';

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    location.href = 'https://saju-today.com';
    return;
  }

  const CURRENT_URL = window.location.href;

  // 공유 함수
  window.shareKakao = function() {
    if (window.Kakao && window.Kakao.isInitialized()) {
      window.Kakao.Share.sendDefault({
        objectType: 'feed',
        content: {
          title: document.title,
          description: 'AI가 분석한 결과를 확인해보세요!',
          imageUrl: 'https://saju-today.com/og-image.png',
          link: { mobileWebUrl: CURRENT_URL, webUrl: CURRENT_URL }
        },
        buttons: [{ title: '✨ 결과 보기', link: { mobileWebUrl: CURRENT_URL, webUrl: CURRENT_URL } }]
      });
    } else {
      copyToClipboard(CURRENT_URL);
    }
  };

  window.shareTwitter = function() {
    const text = 'AI 사주 결과를 확인해보세요! 🔮';
    window.open(
      'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(CURRENT_URL),
      '_blank'
    );
  };

  window.shareInstagram = function() {
    copyToClipboard(CURRENT_URL);
    setTimeout(function() { location.href = 'instagram://'; }, 500);
  };

  function copyToClipboard(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => showToast('링크 복사됨! 🔗'));
    } else {
      const t = document.createElement('textarea');
      t.value = text; document.body.appendChild(t); t.select();
      document.execCommand('copy'); document.body.removeChild(t);
      showToast('링크 복사됨! 🔗');
    }
  }

  function showToast(msg) {
    let t = document.getElementById('toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toast';
      t.style.cssText = 'position:fixed;bottom:220px;left:50%;transform:translateX(-50%);background:#1a1008;color:#f5efe4;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s;white-space:nowrap;';
      document.body.appendChild(t);
    }
    t.textContent = msg; t.style.opacity = '1';
    setTimeout(() => { t.style.opacity = '0'; }, 2500);
  }

  const ICON_MAP = {
    'AI 사주풀이 결과': '✨',
    '오늘의 운세 결과': '🌅',
    'AI 궁합 분석 결과': '💑',
    'AI 작명·이름감정 결과': '✍️',
    'AI 꿈 해몽 결과': '🌙',
    'AI 타로 결과': '🃏',
    'AI 관상 분석 결과': '👁️',
    'AI 택일 결과': '📅',
  };

  // Supabase 조회
  try {
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data, error } = await sb.from('shares').select('title, content, created_at').eq('id', id).single();

    if (error || !data) {
      location.href = 'https://saju-today.com';
      return;
    }

    const title = data.title || '사주 결과';
    const html = data.content?.html || '';
    const icon = ICON_MAP[title] || '🔮';

    // OG 메타 업데이트
    document.title = title + ' | 오늘의 사주';
    document.querySelector('meta[property="og:title"]').setAttribute('content', title);

    // 결과 렌더링
    document.getElementById('content-area').innerHTML =
      '<div class="result-wrapper">' +
        '<div class="result-meta">' +
          '<div class="result-icon">' + icon + '</div>' +
          '<div class="result-meta-text">' +
            '<strong>' + escHtml(title) + '</strong>' +
            '<span>AI가 분석한 결과</span>' +
          '</div>' +
        '</div>' +
        '<div id="result-body">' + html + '</div>' +
      '</div>';

  } catch(e) {
    location.href = 'https://saju-today.com';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
})();
</script>
