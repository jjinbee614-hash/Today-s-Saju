<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>вАюЖиИВЮИ В▓ўвдгВцЉ... | ВўцвіўВЮў ВѓгВБ╝</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family:'Noto Sans KR',sans-serif; background:#f5efe4; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .wrap { text-align:center; color:#1a1008; }
    .spinner { width:40px; height:40px; border:3px solid rgba(26,16,8,0.15); border-top-color:#c9913a; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <p>вАюЖиИВЮИ В▓ўвдгВцЉВъЁвІѕвІц...</p>
</div>
<script>
const { createClient } = supabase;
const sb = createClient('https://kuupemfzqkzinrauhpnd.supabase.co', 'sb_publishable_4KkeyDEpIaQywyNfD1Eksw_FHJ6zIIx');

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    // ВѓгВџЕВъљ ВаЋв│┤ localStorageВЌљ ВађВъЦ
    const user = session.user;
    localStorage.setItem('saju_user', JSON.stringify({
      id: user.id,
      email: user.email,
      name: user.user_metadata?.full_name || user.user_metadata?.name || '',
      avatar: user.user_metadata?.avatar_url || '',
      provider: user.app_metadata?.provider || '',
    }));
    // ВЮ┤Ваё ьјўВЮ┤ВДђ вўљвіћ ьЎѕВю╝вАю
    // ЖИ░ВА┤ ьџїВЏљВЮИВДђ ьЎЋВЮИ
const { data: userData } = await sb.from('users').select('terms_agreed').eq('id', user.id).single();
if (userData?.terms_agreed) {
  const redirect = sessionStorage.getItem('login_redirect') || 'https://saju-today.com';
  sessionStorage.removeItem('login_redirect');
  window.location.href = redirect;
} else {
  window.location.href = 'https://saju-today.com/terms';
}
  }
});

// ВёИВЁў ьЎЋВЮИ
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) {
    const user = session.user;

      name: user.user_metadata?.full_name || user.user_metadata?.name || '',
      avatar: user.user_metadata?.avatar_url || '',
      provider: user.app_metadata?.provider || '',
    }));
    // ЖИ░ВА┤ ьџїВЏљВЮИВДђ ьЎЋВЮИ
const { data: userData } = await sb.from('users').select('terms_agreed').eq('id', user.id).single();
if (userData?.terms_agreed) {
  const redirect = sessionStorage.getItem('login_redirect') || 'https://saju-today.com';
  sessionStorage.removeItem('login_redirect');
  window.location.href = redirect;
} else {
  window.location.href = 'https://saju-today.com/terms';
}
  }
});
</script>
</body>
</html>
