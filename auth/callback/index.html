<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>лЎңк·ёмқё мІҳлҰ¬мӨ‘... | мҳӨлҠҳмқҳ мӮ¬мЈј</title>
  <style>
    body { font-family:'Noto Sans KR',sans-serif; background:#f5efe4; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; flex-direction:column; gap:16px; }
    .spinner { width:40px; height:40px; border:3px solid rgba(26,16,8,0.15); border-top-color:#c9913a; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:#8a7860; font-size:14px; }
  </style>
</head>
<body>
<div class="spinner"></div>
<p>лЎңк·ёмқё мІҳлҰ¬мӨ‘мһ…лӢҲлӢӨ...</p>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
window.addEventListener('load', function() {
(function() {
  var sb = window.supabase.createClient(
    'https://kuupemfzqkzinrauhpnd.supabase.co',
    'sb_publishable_4KkeyDEpIaQywyNfD1Eksw_FHJ6zIIx'
  );

  function saveUser(user) {
    localStorage.setItem('saju_user', JSON.stringify({
      id: user.id,
      email: user.email,
      name: (user.user_metadata && (user.user_metadata.full_name || user.user_metadata.name)) || '',
      avatar: (user.user_metadata && user.user_metadata.avatar_url) || '',
      provider: (user.app_metadata && user.app_metadata.provider) || '',
      membership: 'free'
    }));
  }

  function goNext(user) {
    sb.from('users').select('terms_agreed').eq('id', user.id).single().then(function(res) {
      if (res.data && res.data.terms_agreed) {
        var redirect = sessionStorage.getItem('login_redirect') || 'https://saju-today.com';
        sessionStorage.removeItem('login_redirect');
        window.location.href = redirect;
      } else {
        window.location.href = 'https://saju-today.com/terms';
      }
    }).catch(function() {
      // DB мҳӨлҘҳ мӢң м•ҪкҙҖ нҺҳмқҙм§ҖлЎң
      window.location.href = 'https://saju-today.com/terms';
    });
  }

  // URL н•ҙмӢңм—җм„ң м„ём…ҳ мІҳлҰ¬ (OAuth лҰ¬л””л үм…ҳ)
  sb.auth.getSession().then(function(res) {
    var session = res.data && res.data.session;
    if (session) {
      saveUser(session.user);
      goNext(session.user);
    } else {
      // onAuthStateChangeлЎң лҢҖкё°
      var unsub = sb.auth.onAuthStateChange(function(event, session) {
        if (event === 'SIGNED_IN' && session) {
          unsub.data && unsub.data.subscription && unsub.data.subscription.unsubscribe();
          saveUser(session.user);
          goNext(session.user);
        }
      });
      // 10мҙҲ нӣ„м—җлҸ„ м•Ҳлҗҳл©ҙ лЎңк·ёмқё нҺҳмқҙм§ҖлЎң
      setTimeout(function() {
        window.location.href = 'https://saju-today.com/login';
      }, 10000);
    }
  });
})();
  }); // window.load
</script>
</body>
</html>
