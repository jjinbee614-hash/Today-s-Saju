<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>꿈 해몽 — AI가 분석하는 오늘의 꿈 | 오늘의 사주</title>
  <meta name="description" content="간밤에 꾼 꿈을 입력하면 AI가 길흉을 판단하고 상세하게 해몽해드립니다. 사주팔자와 연계한 정확한 꿈 해몽 서비스."/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1008; --paper: #f5efe4; --card: #ede5d8;
      --border: rgba(26,16,8,0.15); --muted: #8a7860;
      --gold: #c9913a; --blue: #1a4a6b; --red: #8b1a1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; background: rgba(245,239,228,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; color: var(--ink); text-decoration: none; }
    .logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 8px; }
    .nav-btn { background: none; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; color: var(--ink); font-family: 'Noto Sans KR', sans-serif; text-decoration: none; display: inline-block; }
    .nav-btn:hover { background: var(--ink); color: var(--paper); }
    .nav-btn.active { background: var(--gold); color: white; border-color: var(--gold); }

    /* MAIN */
    .main { max-width: 640px; margin: 0 auto; padding: 100px 24px 60px; }
    .page-title { font-family: 'Noto Serif KR', serif; font-size: 30px; font-weight: 700; margin-bottom: 8px; }
    .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; line-height: 1.7; }

    label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
    textarea, input[type=number] { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--card); font-family: 'Noto Sans KR', sans-serif; }
    textarea { min-height: 140px; resize: vertical; line-height: 1.8; }

    .submit-btn { width: 100%; padding: 16px; background: var(--ink); color: var(--paper); border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Noto Serif KR', serif; margin-top: 8px; }
    .submit-btn:hover { background: #2d1f0e; }

    .saju-loading { text-align: center; padding: 48px 24px; color: var(--muted); }
    .big-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 12px 24px; border-radius: 24px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }

    .saju-birth-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  </style>
</head>
<body>

<nav>
  <a href="https://saju-today.com" class="logo">오늘의<span>사주</span></a>
  <div class="nav-links">
    <a href="https://saju-today.com" class="nav-btn">사주풀이</a>
    <a href="https://saju-today.com" class="nav-btn">운세</a>
    <a href="https://saju-today.com/dream.html" class="nav-btn active">꿈해몽</a>
  </div>
</nav>

<div class="main">
  <h1 class="page-title">🌙 꿈 해몽</h1>
  <p class="page-sub">간밤에 꾼 꿈을 입력하면 AI가 길흉을 판단하고 상세하게 해몽해드립니다.<br>사주팔자와 연계하면 더욱 정확한 해몽이 가능해요.</p>

  <!-- 꿈 분위기 -->
  <div style="margin-bottom:20px;">
    <label>꿈의 분위기</label>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button id="dream-mood-good" onclick="setDreamMood('좋은꿈')"
        style="padding:8px 18px;border:2px solid var(--gold);border-radius:20px;background:var(--gold);color:white;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;">
        😊 좋은 꿈
      </button>
      <button id="dream-mood-bad" onclick="setDreamMood('나쁜꿈')"
        style="padding:8px 18px;border:2px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;">
        😰 나쁜 꿈
      </button>
      <button id="dream-mood-unknown" onclick="setDreamMood('모호한꿈')"
        style="padding:8px 18px;border:2px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;">
        🤔 모호한 꿈
      </button>
    </div>
  </div>

  <!-- 꿈 내용 -->
  <div style="margin-bottom:20px;">
    <label>꿈 내용 <span style="color:var(--muted);font-weight:400;">(자세히 적을수록 정확해요)</span></label>
    <textarea id="dream-content" placeholder="예: 큰 뱀이 나를 쫓아오다가 갑자기 황금빛으로 변했어요. 하늘을 날다가 바다에 빠지는 꿈을 꿨어요..."></textarea>
  </div>

  <!-- 사주 연계 -->
  <div style="background:rgba(26,74,107,0.05);border:1px solid rgba(26,74,107,0.2);border-radius:8px;padding:16px;margin-bottom:20px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <input type="checkbox" id="dream-saju-toggle" onchange="toggleDreamSaju()" style="width:16px;height:16px;cursor:pointer;"/>
      <label for="dream-saju-toggle" style="cursor:pointer;margin-bottom:0;">🔮 사주팔자와 연계하여 더 정확한 해몽 (생년월일 입력)</label>
    </div>
    <div id="dream-saju-fields" style="display:none;">
      <div class="saju-birth-grid">
        <div><label style="font-size:12px;">출생 연도</label><input type="number" id="dream-year" placeholder="1990"/></div>
        <div><label style="font-size:12px;">월</label><input type="number" id="dream-month" placeholder="1" min="1" max="12"/></div>
        <div><label style="font-size:12px;">일</label><input type="number" id="dream-day" placeholder="1" min="1" max="31"/></div>
      </div>
    </div>
  </div>

  <button class="submit-btn" onclick="runDream()">🌙 꿈 해몽하기 ✦</button>

  <!-- 결과 -->
  <div id="dream-result" style="display:none;margin-top:32px;"></div>
</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

const WORKER_URL = 'https://saju-proxy.jjinbee614.workers.dev';

function callAPI(prompt) {
  return fetch(WORKER_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:2000,
      messages:[{ role:"user", content:prompt }]
    })
  }).then(res => {
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }).then(data => {
    if (data.error) throw new Error(data.error.message);
    const raw = data.content.map(i=>i.text||'').join('');
    const s = raw.indexOf('{');
    if (s < 0) throw new Error('JSON을 찾을 수 없습니다: ' + raw.slice(0,80));
    const e = raw.lastIndexOf('}');
    return JSON.parse(raw.slice(s, e+1));
  });
}

function calcSaju(year, month, day, timeName) {
  const yp = calcYearPillar(year);
  const mp = calcMonthPillar(year, month, day);
  const dp = calcDayPillar(year, month, day);
  const tp = calcTimePillar(dp.hs, timeName);

  // 오행 분포 (천간15 지지10 가중)
  const elemCount = { 목:0, 화:0, 토:0, 금:0, 수:0 };
  [yp, mp, dp, tp].forEach(p => {
    if (p.hs >= 0) {
      elemCount[HS_ELEM[p.hs]] = (elemCount[HS_ELEM[p.hs]] || 0) + 15;
      elemCount[EB_ELEM[p.eb]] = (elemCount[EB_ELEM[p.eb]] || 0) + 10;
    }
  });
  const total = Object.values(elemCount).reduce((a,b)=>a+b,0) || 1;
  const elements = {};
  Object.entries(elemCount).forEach(([k,v]) => elements[k] = Math.round(v/total*100));

  const dayMasterDesc = DAY_MASTER_DESC[dp.heavenly] || `일간 ${dp.heavenly}`;

  return { yp, mp, dp, tp,
    year: yp, month: mp, day: dp, time: tp,  // buildSajuTable 호환용 별칭
    elements, daymaster: dayMasterDesc };
}

// ════ 사주풀이 페이지 ════
let sajuGender = '남성';


// ─── 꿈 해몽 ───
let dreamMood = '좋은꿈';

function setDreamMood(mood) {
  dreamMood = mood;
  const moods = { '좋은꿈': 'good', '나쁜꿈': 'bad', '모호한꿈': 'unknown' };
  ['good','bad','unknown'].forEach(m => {
    const btn = document.getElementById(`dream-mood-${m}`);
    if (!btn) return;
    const isActive = moods[mood] === m;
    btn.style.background = isActive ? 'var(--gold)' : 'var(--card)';
    btn.style.color = isActive ? 'white' : 'var(--ink)';
    btn.style.borderColor = isActive ? 'var(--gold)' : 'var(--border)';
  });
}

function toggleDreamSaju() {
  const checked = document.getElementById('dream-saju-toggle').checked;
  document.getElementById('dream-saju-fields').style.display = checked ? 'grid' : 'none';
}

async function runDream() {
  const dreamText = document.getElementById('dream-content').value.trim();
  if (!dreamText || dreamText.length < 10) {
    showToast('꿈 내용을 조금 더 자세히 입력해주세요'); return;
  }

  const resultEl = document.getElementById('dream-result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `<div class="saju-loading"><div class="big-spinner"></div><p>꿈을 해몽하고 있습니다...<br>길흉을 분석하는 중이에요.</p></div>`;
  resultEl.scrollIntoView({behavior:'smooth', block:'start'});

  // 사주 연계
  const withSaju = document.getElementById('dream-saju-toggle').checked;
  let sajuInfo = '';
  if (withSaju) {
    const y = parseInt(document.getElementById('dream-year').value);
    const m = parseInt(document.getElementById('dream-month').value);
    const d = parseInt(document.getElementById('dream-day').value);
    if (y && m && d) {
      const p = calcSaju(y, m, d, '모름');
      const strongEl = Object.entries(p.elements).sort((a,b)=>b[1]-a[1])[0][0];
      sajuInfo = `
【사주 정보】 연주 ${p.yp.heavenly}${p.yp.earthly} 월주 ${p.mp.heavenly}${p.mp.earthly} 일주 ${p.dp.heavenly}${p.dp.earthly} / 강한 오행: ${strongEl}`;
    }
  }

  try {
    const prompt = `당신은 전통 꿈 해몽 전문가입니다. 아래 꿈을 상세하게 해몽해주세요.

【꿈 내용】 ${dreamText}
【꿈 분위기】 ${dreamMood}${sajuInfo}

순수 JSON만 출력하세요.

{"gilhung":"대길","gilhungScore":85,"gilhungEmoji":"🟡","summary":"꿈 핵심 한 줄 요약","interpretation":"꿈의 상징과 의미를 전통 해몽 관점에서 3~4문장으로 상세 해석","symbols":[{"symbol":"꿈에 나온 요소1","meaning":"상징 의미"},{"symbol":"요소2","meaning":"의미"}],"fortune":{"wealth":"이 꿈이 재물과 관련된 의미","love":"애정운과의 연관","career":"직업/사업운과의 연관","caution":"주의할 점"},"advice":"꿈을 꾼 후 행동 조언 2문장"}`;

    const r = await callAPI(prompt);

    const gilColors = {
      '대길': '#27ae60', '길': '#c9913a', '평': '#1a4a6b',
      '흉': '#c0392b', '대흉': '#922b21'
    };
    const color = gilColors[r.gilhung] || '#c9913a';
    const score = r.gilhungScore || 70;

    const html = `
      <!-- 길흉 헤더 -->
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px;text-align:center;">
        <div style="font-size:48px;margin-bottom:8px;">${r.gilhungEmoji || '🌙'}</div>
        <div style="font-size:32px;font-weight:800;color:${color};margin-bottom:4px;">${r.gilhung}</div>
        <div style="background:var(--border);border-radius:4px;height:8px;width:200px;margin:10px auto;">
          <div style="height:8px;border-radius:4px;width:${score}%;background:${color};transition:width 0.8s;"></div>
        </div>
        <div style="font-size:13px;color:var(--muted);margin-top:8px;">${r.summary || ''}</div>
      </div>

      <!-- 해몽 -->
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:12px;">
        <h4 style="font-size:14px;font-weight:700;margin-bottom:12px;">📖 해몽</h4>
        <p style="font-size:13px;line-height:1.9;color:var(--ink);">${r.interpretation || ''}</p>
      </div>

      <!-- 꿈 상징 -->
      ${r.symbols && r.symbols.length > 0 ? `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:12px;">
        <h4 style="font-size:14px;font-weight:700;margin-bottom:12px;">🔮 꿈 속 상징</h4>
        ${r.symbols.map(s => `
          <div style="display:flex;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);">
            <span style="font-size:13px;font-weight:700;color:var(--gold);min-width:80px;">${s.symbol}</span>
            <span style="font-size:13px;color:var(--muted);line-height:1.7;">${s.meaning}</span>
          </div>`).join('')}
      </div>` : ''}

      <!-- 운세 연관 -->
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:12px;">
        <h4 style="font-size:14px;font-weight:700;margin-bottom:12px;">🍀 운세와의 연관</h4>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div style="background:var(--paper);border-radius:8px;padding:12px;">
            <div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:4px;">💰 재물</div>
            <p style="font-size:12px;line-height:1.7;margin:0;">${r.fortune?.wealth || ''}</p>
          </div>
          <div style="background:var(--paper);border-radius:8px;padding:12px;">
            <div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:4px;">💕 애정</div>
            <p style="font-size:12px;line-height:1.7;margin:0;">${r.fortune?.love || ''}</p>
          </div>
          <div style="background:var(--paper);border-radius:8px;padding:12px;">
            <div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:4px;">💼 직업</div>
            <p style="font-size:12px;line-height:1.7;margin:0;">${r.fortune?.career || ''}</p>
          </div>
          <div style="background:var(--paper);border-radius:8px;padding:12px;">
            <div style="font-size:11px;color:#c0392b;font-weight:700;margin-bottom:4px;">⚠️ 주의</div>
            <p style="font-size:12px;line-height:1.7;margin:0;">${r.fortune?.caution || ''}</p>
          </div>
        </div>
      </div>

      <!-- 조언 -->
      <div style="background:rgba(201,145,58,0.1);border-left:3px solid var(--gold);padding:14px 18px;border-radius:0 8px 8px 0;">
        <div style="font-size:11px;color:#c9913a;letter-spacing:1px;margin-bottom:6px;">💡 조언</div>
        <p style="font-size:13px;line-height:1.8;">${r.advice || ''}</p>
      </div>`;

    resultEl.innerHTML = html;
  } catch(e) {
    resultEl.innerHTML = `<div style="background:#fff3f3;border:1px solid #e74c3c;border-radius:8px;padding:16px;color:#c0392b;"><strong>⚠️ 오류:</strong> ${e.message}</div>`;
  }
}

</script>
</body>
</html>
