<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>회원가입 | 오늘의 사주</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
  /* 한자 전용 폰트 */
  /* 텍스트 중간 한자 인라인 표시용 */
  .hanja-char {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC',
                 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW',
                 'Source Han Sans CN', 'SimSun', 'MingLiU', 'SimHei',
                 'MS Mincho', 'MS Gothic', 'UnBatang', 'UnDotum',
                 'Apple SD Gothic Neo', 'Heiti TC', 'STSong', 'FangSong', serif !important;
    font-size: inherit !important;
    display: inline !important;
    line-height: inherit;
  }
  /* 한자 선택기 버튼 전용 */
  .hanja-btn-char {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Serif KR',
                 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', serif !important;
    font-size: 20px !important;
    display: block !important;
    line-height: 1.4;
  }
  /* 한자 입력 필드 */
  .hanja-input, input.hanja-input {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Serif KR',
                 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', serif !important;
    font-size: 18px !important;
  }
  /* 한자 입력 필드 */
  #judge-hanja, #rename-hanja, #naming-surname-han,
  #hanja-manual-0, #hanja-manual-1, #hanja-manual-2,
  [id^="hanja-manual-"] {
    font-family: 'Noto Serif SC', 'Noto Sans SC', 'Noto Serif KR',
                 'SimSun', 'MS Mincho', 'Apple SD Gothic Neo', serif !important;
    font-size: 18px !important;
  }

  :root {
    --ink: #1a1008;
    --paper: #f5efe4;
    --gold: #c9913a;
    --red: #c0392b;
    --blue: #1a4a6b;
    --muted: #8a7860;
    --card: #fdf8f0;
    --border: #d9c9aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(201,145,58,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(192,57,43,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(245,239,228,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    flex-wrap: nowrap;
    overflow: hidden;
  }
  @media (max-width: 600px) {
    nav {
      flex-direction: column;
      align-items: flex-start;
      padding: 8px 12px;
      gap: 8px;
    }
  }
  .logo {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif;
    font-size: 22px; font-weight: 700;
    color: var(--ink);
    letter-spacing: 4px;
  }
  .logo span { color: var(--gold); }
  .nav-links {
    display: flex; gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
    max-width: 100%;
    flex-wrap: nowrap;
  }
  .nav-links::-webkit-scrollbar { display: none; }
  .nav-btn {
    background: none; border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 20px;
    font-size: 12px; cursor: pointer;
    color: var(--ink); transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--ink); color: var(--paper); }
  .nav-btn.primary { background: var(--gold); color: white; border-color: var(--gold); }
  .nav-btn.primary:hover { background: #a8742e; }

  /* ─── PAGES ─── */
  .page { display: none; min-height: 100vh; padding-top: 72px; position: relative; z-index: 1; }
  .page.active { display: block; }

  /* ─── HERO ─── */
  .hero {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: calc(100vh - 72px);
    text-align: center; padding: 60px 24px;
  }
  .hero-badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold); font-size: 11px; letter-spacing: 3px;
    padding: 6px 20px; border-radius: 20px; margin-bottom: 40px;
    text-transform: uppercase;
  }
  .hero h1 {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif;
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 700; line-height: 1.15;
    letter-spacing: -1px; margin-bottom: 24px;
    color: var(--ink);
  }
  .hero h1 em {
    font-style: normal; color: var(--gold);
    border-bottom: 3px solid var(--gold);
  }
  .hero p {
    font-size: 17px; color: var(--muted); max-width: 500px;
    line-height: 1.8; margin-bottom: 48px;
  }
  .hero-cta {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  }
  .btn-primary {
    background: var(--ink); color: var(--paper);
    border: none; padding: 16px 40px; border-radius: 4px;
    font-size: 15px; cursor: pointer; letter-spacing: 1px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: var(--gold); transform: translateY(-2px); }
  .btn-secondary {
    background: transparent; color: var(--ink);
    border: 1px solid var(--ink); padding: 16px 40px; border-radius: 4px;
    font-size: 15px; cursor: pointer; letter-spacing: 1px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--ink); color: var(--paper); }

  /* Decorative elements */
  .symbols {
    position: absolute; font-size: 120px; opacity: 0.04;
    font-family: serif; pointer-events: none; user-select: none;
  }
  .sym-1 { top: 15%; left: 5%; transform: rotate(-15deg); }
  .sym-2 { bottom: 20%; right: 6%; transform: rotate(10deg); }

  /* ─── FEATURES ─── */
  .features {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px; max-width: 1000px; margin: 60px auto; padding: 0 24px;
  }
  .feat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 32px 28px; text-align: center;
  }
  .feat-icon { font-size: 36px; margin-bottom: 16px; display: block; }
  .feat-card h3 { font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 18px; margin-bottom: 10px; }
  .feat-card p { font-size: 14px; color: var(--muted); line-height: 1.7; }

  /* ─── FORM ─── */
  .form-page { max-width: 600px; margin: 0 auto; padding: 48px 24px; }
  .form-title {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 30px;
    margin-bottom: 8px;
  }
  .form-sub { color: var(--muted); font-size: 14px; margin-bottom: 40px; line-height: 1.6; }

  .form-section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 28px; margin-bottom: 20px;
  }
  .form-section h3 {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 16px;
    margin-bottom: 20px; color: var(--gold);
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
  input, select, textarea {
    width: 100%; padding: 12px 14px;
    background: var(--paper); border: 1px solid var(--border);
    border-radius: 4px; font-size: 14px; color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--gold);
  }
  textarea { resize: vertical; min-height: 80px; }

  /* Gender toggle */
  .gender-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .gender-toggle button {
    flex: 1; padding: 12px; background: var(--paper);
    border: none; cursor: pointer; font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s; color: var(--muted);
  }
  .gender-toggle button.active { background: var(--ink); color: white; }

  .submit-btn {
    width: 100%; padding: 18px; background: var(--ink);
    color: var(--paper); border: none; border-radius: 4px;
    font-size: 16px; cursor: pointer; letter-spacing: 2px;
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif;
    transition: all 0.2s; margin-top: 8px;
  }
  .submit-btn:hover { background: var(--gold); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ─── MATCHES ─── */
  .matches-page { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
  .matches-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; flex-wrap: gap;
  }
  .matches-header h2 { font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 26px; }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .filter-chip {
    padding: 7px 18px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--paper);
    font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .filter-chip.active { background: var(--ink); color: white; border-color: var(--ink); }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
  .match-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .match-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
  .match-card-top {
    padding: 28px 24px 20px;
    background: linear-gradient(135deg, #1a1008 0%, #2d1f0e 100%);
    color: var(--paper); text-align: center; position: relative;
  }
  .match-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--gold); display: flex; align-items: center;
    justify-content: center; font-size: 28px; margin: 0 auto 12px;
    border: 3px solid rgba(255,255,255,0.2);
  }
  .match-name { font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 18px; margin-bottom: 4px; }
  .match-age { font-size: 13px; opacity: 0.7; }
  .compatibility-badge {
    position: absolute; top: 16px; right: 16px;
    background: var(--gold); color: white;
    padding: 4px 10px; border-radius: 12px;
    font-size: 13px; font-weight: 600;
  }
  .match-card-body { padding: 20px 24px; }
  .saju-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .saju-pill {
    text-align: center; padding: 8px 4px;
    border: 1px solid var(--border); border-radius: 4px;
  }
  .saju-pill .label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 2px; }
  .saju-pill .value { font-size: 13px; font-weight: 500; }
  .match-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag {
    font-size: 11px; padding: 3px 10px; border-radius: 12px;
    border: 1px solid var(--border); color: var(--muted);
  }
  .match-actions { display: flex; gap: 8px; }
  .action-btn {
    flex: 1; padding: 10px; border-radius: 4px; border: none;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .action-btn.like { background: var(--ink); color: white; }
  .action-btn.like:hover { background: var(--gold); }
  .action-btn.skip { background: var(--paper); color: var(--muted); border: 1px solid var(--border); }

  /* ─── CHAT ─── */
  .chat-page { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
  .chat-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .chat-item {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px; background: var(--card);
    border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; transition: all 0.2s;
  }
  .chat-item:hover { border-color: var(--gold); }
  .chat-item-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--ink); display: flex; align-items: center;
    justify-content: center; font-size: 22px; flex-shrink: 0;
  }
  .chat-item-info { flex: 1; }
  .chat-item-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .chat-item-preview { font-size: 13px; color: var(--muted); }
  .chat-item-time { font-size: 12px; color: var(--muted); }

  .chat-window {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .chat-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .chat-messages {
    height: 380px; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 70%; }
  .msg.me { align-self: flex-end; }
  .msg.them { align-self: flex-start; }
  .msg-bubble {
    padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6;
  }
  .msg.me .msg-bubble { background: var(--ink); color: white; border-radius: 16px 16px 4px 16px; }
  .msg.them .msg-bubble { background: var(--paper); border: 1px solid var(--border); border-radius: 16px 16px 16px 4px; }
  .msg-time { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .msg.me .msg-time { text-align: right; }
  .chat-input-row {
    padding: 16px; border-top: 1px solid var(--border);
    display: flex; gap: 12px; align-items: center;
  }
  .chat-input {
    flex: 1; padding: 12px 16px; border: 1px solid var(--border);
    border-radius: 24px; background: var(--paper); font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .send-btn {
    padding: 12px 20px; background: var(--ink); color: white;
    border: none; border-radius: 24px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s;
  }
  .send-btn:hover { background: var(--gold); }

  /* ─── AI ANALYSIS ─── */
  .analysis-box {
    background: linear-gradient(135deg, #1a1008, #2d1f0e);
    border-radius: 8px; padding: 28px; color: var(--paper);
    margin-bottom: 20px;
  }
  .analysis-box h3 { font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 18px; margin-bottom: 16px; color: var(--gold); }
  .analysis-text { font-size: 14px; line-height: 2; opacity: 0.9; }
  .analysis-loading {
    display: flex; align-items: center; gap: 12px;
    font-size: 14px; opacity: 0.7;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .compat-meter {
    display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .compat-item { flex: 1; min-width: 120px; }
  .compat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .compat-bar {
    height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
  }
  .compat-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
  .compat-fill.high { background: #27ae60; }
  .compat-fill.mid { background: var(--gold); }
  .compat-fill.low { background: var(--red); }
  .compat-pct { font-size: 13px; font-weight: 600; margin-top: 4px; }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--paper); border-radius: 12px;
    width: 100%; max-width: 640px; max-height: 90vh;
    overflow-y: auto; position: relative;
  }
  .modal-header {
    padding: 24px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h3 { font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 20px; }
  .close-btn {
    background: none; border: 1px solid var(--border);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 16px; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-body { padding: 28px; }

  /* ─── ALERTS ─── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: white;
    padding: 14px 28px; border-radius: 4px;
    font-size: 14px; z-index: 300;
    transition: transform 0.3s; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .menu-item { display:block; width:100%; padding:10px 16px; background:none; border:none; text-align:left; font-size:14px; font-family:'Noto Sans KR',sans-serif; color:var(--ink); cursor:pointer; border-radius:8px; }
  .menu-item:hover { background:var(--card); color:var(--gold); }

  /* Divider */
  .divider {
    text-align: center; position: relative; margin: 32px 0;
    color: var(--muted); font-size: 12px; letter-spacing: 2px;
  }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: 50%;
    width: 40%; height: 1px; background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  /* Stats */
  .stats-row {
    display: flex; gap: 40px; justify-content: center;
    padding: 40px 24px; border-top: 1px solid var(--border);
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Noto Serif SC', 'Noto Serif TC', 'Noto Sans SC', 'Noto Sans TC', 'Noto Serif KR', 'Source Han Serif CN', 'Source Han Serif TW', 'SimSun', 'MingLiU', 'MS Mincho', 'Apple SD Gothic Neo', 'STSong', 'FangSong', serif; font-size: 32px;
    color: var(--gold); display: block; margin-bottom: 4px;
  }
  .stat-label { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

  /* ─── SAJU READING ─── */
  .saju-reading-page { max-width: 780px; margin: 0 auto; padding: 48px 24px; }
  .saju-input-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 36px 32px; margin-bottom: 32px;
  }
  .saju-input-card h2 { font-family:'Noto Serif SC','Noto Serif KR',serif; font-size:26px; margin-bottom:6px; }
  .saju-input-card p { color:var(--muted); font-size:14px; margin-bottom:28px; line-height:1.7; }
  .saju-birth-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px; margin-bottom:16px; }
  .saju-gender-row { display:flex; gap:12px; margin-bottom:20px; align-items:center; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showModal(type) {
  const data = TERMS[type];
  document.getElementById('modal-title').textContent = data.title;
  document.getElementById('modal-content').textContent = data.content;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function toggleAll() {
  const all = document.getElementById('agree-all');
  const checks = ['agree-terms','agree-privacy','agree-age','agree-marketing'];
  checks.forEach(id => document.getElementById(id).checked = all.checked);
  updateSubmit();
}

function updateAll() {
  const required = ['agree-terms','agree-privacy','agree-age'];
  const all = ['agree-terms','agree-privacy','agree-age','agree-marketing'];
  const allChecked = all.every(id => document.getElementById(id).checked);
  document.getElementById('agree-all').checked = allChecked;
  updateSubmit();
}

function updateSubmit() {
  const required = ['agree-terms','agree-privacy','agree-age'];
  const ok = required.every(id => document.getElementById(id).checked);
  document.getElementById('submit-btn').disabled = !ok;
}

async function submitAgree() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '처리중...';

  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      showToast('로그인이 필요합니다');
      window.location.href = '/login';
      return;
    }

    const user = session.user;
    const now = new Date().toISOString();
    const marketing = document.getElementById('agree-marketing').checked;

    // Supabase users 테이블에 저장
    const { error } = await sb.from('users').upsert({
      id: user.id,
      email: user.email,
      name: user.user_metadata?.full_name || user.user_metadata?.name || '',
      avatar: user.user_metadata?.avatar_url || '',
      provider: user.app_metadata?.provider || '',
      terms_agreed: true,
      terms_agreed_at: now,
      privacy_agreed: true,
      privacy_agreed_at: now,
      marketing_agreed: marketing,
      membership: 'free',
    });

    if (error) throw error;

    // localStorage에도 저장
    localStorage.setItem('saju_user', JSON.stringify({
      id: user.id,
      email: user.email,
      name: user.user_metadata?.full_name || user.user_metadata?.name || '',
      avatar: user.user_metadata?.avatar_url || '',
      provider: user.app_metadata?.provider || '',
      membership: 'free',
      terms_agreed: true,
    }));

    // 이전 페이지 또는 홈으로
    const redirect = sessionStorage.getItem('login_redirect') || 'https://saju-today.com';
    sessionStorage.removeItem('login_redirect');
    window.location.href = redirect;

  } catch(e) {
    showToast('오류가 발생했습니다: ' + e.message);
    btn.disabled = false;
    btn.textContent = '동의하고 시작하기 ✦';
  }
}

// 로그인 상태 확인
async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = '/login';
    return;
  }

  // 이미 약관 동의한 사용자면 홈으로
  const { data: userData } = await sb.from('users').select('terms_agreed').eq('id', session.user.id).single();
  if (userData?.terms_agreed) {
    const redirect = sessionStorage.getItem('login_redirect') || 'https://saju-today.com';
    sessionStorage.removeItem('login_redirect');
    window.location.href = redirect;
  }
}

checkAuth();
</script>
