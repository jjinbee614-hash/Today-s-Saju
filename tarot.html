<script>
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

const WORKER_URL = 'https://saju-proxy.jjinbee614.workers.dev';

function callAPI(prompt) {
  return fetch(WORKER_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:2000,
      messages:[{ role:"user", content:prompt }]
    })
  }).then(res => {
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }).then(data => {
    if (data.error) throw new Error(data.error.message);
    const raw = data.content.map(i=>i.text||'').join('');
    const s = raw.indexOf('{');
    if (s < 0) throw new Error('JSON을 찾을 수 없습니다: ' + raw.slice(0,80));
    const e = raw.lastIndexOf('}');
    return JSON.parse(raw.slice(s, e+1));
  });
}

let spreadCount = 1;
let selectedCards = [];
let shuffledDeck = [];

function setSpread(n) {
  spreadCount = n;
  selectedCards = [];
  const btn1 = document.getElementById('spread-1');
  const btn3 = document.getElementById('spread-3');
  btn1.style.background = n===1 ? 'var(--gold)' : 'var(--card)';
  btn1.style.color = n===1 ? 'white' : 'var(--ink)';
  btn1.style.borderColor = n===1 ? 'var(--gold)' : 'var(--border)';
  btn3.style.background = n===3 ? 'var(--gold)' : 'var(--card)';
  btn3.style.color = n===3 ? 'white' : 'var(--ink)';
  btn3.style.borderColor = n===3 ? 'var(--gold)' : 'var(--border)';
  updateSelectedDisplay();
  renderDeck();
  document.getElementById('tarot-submit').disabled = true;
  document.getElementById('tarot-result').style.display = 'none';
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderDeck() {
  shuffledDeck = shuffleArray(TAROT_CARDS);
  const guide = document.getElementById('pick-guide');
  guide.textContent = `카드 ${spreadCount}장을 선택해주세요`;

  const grid = document.getElementById('deck-grid');
  grid.innerHTML = shuffledDeck.map((card, idx) => {
    const isSelected = selectedCards.find(c => c.id === card.id);
    const isDisabled = !isSelected && selectedCards.length >= spreadCount;
    return `<button class="tarot-card-btn ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled' : ''}"
      onclick="selectCard(${card.id})" title="${card.name} — ${card.meaning}">
      <svg viewBox="0 0 52 88" xmlns="http://www.w3.org/2000/svg">
        <image href="${card.img}" x="0" y="0" width="52" height="88" preserveAspectRatio="xMidYMid slice"
          onerror="this.style.display='none'"/>
        ${isSelected ? '<rect x="0" y="0" width="52" height="88" fill="rgba(201,145,58,0.3)"/><text x="26" y="48" text-anchor="middle" fill="#ffd700" font-size="20">★</text>' : ''}
      </svg>
    </button>`;
  }).join('');
}

function selectCard(cardId) {
  const card = TAROT_CARDS.find(c => c.id === cardId);
  const alreadyIdx = selectedCards.findIndex(c => c.id === cardId);

  if (alreadyIdx >= 0) {
    selectedCards.splice(alreadyIdx, 1);
  } else {
    if (selectedCards.length >= spreadCount) return;
    selectedCards.push(card);
  }

  updateSelectedDisplay();
  renderDeckButtons();

  const submit = document.getElementById('tarot-submit');
  submit.disabled = selectedCards.length !== spreadCount;
  const guide = document.getElementById('pick-guide');
  guide.textContent = selectedCards.length === spreadCount
    ? '✅ 선택 완료! 아래 버튼을 눌러주세요'
    : `카드 ${spreadCount - selectedCards.length}장 더 선택해주세요`;
}

function renderDeckButtons() {
  const grid = document.getElementById('deck-grid');
  const btns = grid.querySelectorAll('.tarot-card-btn');
  shuffledDeck.forEach((card, idx) => {
    const btn = btns[idx];
    if (!btn) return;
    const isSelected = selectedCards.find(c => c.id === card.id);
    const isDisabled = !isSelected && selectedCards.length >= spreadCount;
    btn.className = `tarot-card-btn ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled' : ''}`;
    const svg = btn.querySelector('svg');
    if (svg) {
      const overlay = svg.querySelector('rect[fill]');
      const star = svg.querySelector('text');
      if (isSelected) {
        if (!overlay) {
          const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
          r.setAttribute('x','0'); r.setAttribute('y','0');
          r.setAttribute('width','52'); r.setAttribute('height','88');
          r.setAttribute('fill','rgba(201,145,58,0.3)');
          svg.appendChild(r);
          const t = document.createElementNS('http://www.w3.org/2000/svg','text');
          t.setAttribute('x','26'); t.setAttribute('y','48');
          t.setAttribute('text-anchor','middle');
          t.setAttribute('fill','#ffd700'); t.setAttribute('font-size','20');
          t.textContent = '★'; svg.appendChild(t);
        }
      } else {
        if (overlay) overlay.remove();
        if (star) star.remove();
      }
    }
  });
}

function updateSelectedDisplay() {
  const display = document.getElementById('selected-display');
  let html = '';
  for (let i = 0; i < spreadCount; i++) {
    const card = selectedCards[i];
    if (card) {
      const labels = spreadCount === 3 ? ['과거','현재','미래'] : [''];
      html += `<div class="selected-card-display" style="padding:0;overflow:hidden;position:relative;">
        <svg viewBox="0 0 70 105" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;">
          <image href="${card.img}" x="0" y="0" width="70" height="105" preserveAspectRatio="xMidYMid slice"/>
          <rect x="0" y="72" width="70" height="33" fill="rgba(0,0,0,0.7)"/>
          <text x="35" y="87" text-anchor="middle" fill="#c9913a" font-size="9" font-family="serif">${card.name}</text>
          <text x="35" y="100" text-anchor="middle" fill="rgba(201,145,58,0.7)" font-size="8" font-family="serif">${labels[i]||''}</text>
        </svg>
      </div>`;
    } else {
      const labels = spreadCount === 3 ? ['과거','현재','미래'] : ['?'];
      html += `<div class="card-slot" style="color:rgba(201,145,58,0.3);font-size:12px;">${labels[i]||'?'}</div>`;
    }
  }
  display.innerHTML = html;
}

async function runTarot() {
  if (selectedCards.length !== spreadCount) return;

  const question = document.getElementById('tarot-question').value.trim();
  const resultEl = document.getElementById('tarot-result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `<div class="saju-loading"><div class="big-spinner"></div><p>타로 카드를 해석하고 있습니다...<br>카드의 상징과 의미를 분석 중이에요.</p></div>`;
  resultEl.scrollIntoView({behavior:'smooth', block:'start'});

  const cardInfo = selectedCards.map((c, i) => {
    const pos = spreadCount === 3 ? ['과거','현재','미래'][i] : '현재';
    return `${pos}: ${c.name}(${c.en}) — ${c.meaning}`;
  }).join('\n');

  const prompt = `타로 전문가. 순수 JSON만 출력.
카드:${cardInfo}
질문:${question || '오늘의 전반적인 운세'}
{"summary":"전체 한줄요약","cards":[{"name":"카드명","position":"위치","interpretation":"이 카드가 의미하는 것 2문장","advice":"조언 1문장"}],"overall":"종합 해석 2문장","action":"지금 당장 할 수 있는 행동 1문장"}`;

  try {
    const r = await callAPI(prompt);

    const cardColors = {'🔥':'#c0392b','💧':'#1a4a6b','🌬️':'#6c3483','🌿':'#27ae60','🌟':'#c9913a','⭐':'#c9913a'};

    const html = `
      <div style="background:var(--dark);border-radius:12px;padding:20px;margin-bottom:16px;text-align:center;">
        <div style="display:flex;gap:12px;justify-content:center;margin-bottom:16px;">
          ${selectedCards.map((c,i) => {
            const labels = spreadCount===3 ? ['과거','현재','미래'] : [''];
            return `<div style="text-align:center;">
              <div style="width:60px;height:90px;border-radius:8px;border:2px solid var(--gold);margin:0 auto 6px;overflow:hidden;box-shadow:0 4px 12px rgba(201,145,58,0.4);">
                <svg viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;">
                  <image href="${c.img}" x="0" y="0" width="60" height="90" preserveAspectRatio="xMidYMid slice"/>
                </svg>
              </div>
              <div style="color:var(--gold);font-size:11px;">${c.name}</div>
              ${spreadCount===3 ? `<div style="color:rgba(201,145,58,0.5);font-size:10px;">${labels[i]}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
        <p style="color:#f0e6d3;font-size:14px;line-height:1.7;">${r.summary||''}</p>
      </div>

      ${(r.cards||[]).map(c => `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <span style="background:var(--gold);color:white;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">${c.position||''}</span>
          <span style="font-size:14px;font-weight:700;">${c.name||''}</span>
        </div>
        <p style="font-size:13px;line-height:1.8;color:var(--ink);margin-bottom:8px;">${c.interpretation||''}</p>
        <div style="background:rgba(201,145,58,0.1);border-left:3px solid var(--gold);padding:8px 12px;border-radius:0 6px 6px 0;">
          <p style="font-size:12px;color:var(--muted);">💡 ${c.advice||''}</p>
        </div>
      </div>`).join('')}

      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px;">
        <h4 style="font-size:14px;font-weight:700;margin-bottom:10px;">🔮 종합 해석</h4>
        <p style="font-size:13px;line-height:1.9;">${r.overall||''}</p>
      </div>

      <div style="background:rgba(201,145,58,0.1);border-left:3px solid var(--gold);padding:14px 18px;border-radius:0 8px 8px 0;">
        <div style="font-size:11px;color:#c9913a;margin-bottom:6px;">⚡ 지금 당장 할 것</div>
        <p style="font-size:13px;line-height:1.8;">${r.action||''}</p>
      </div>

      <button onclick="resetTarot()" style="width:100%;margin-top:16px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;font-family:'Noto Sans KR',sans-serif;">🔄 다시 뽑기</button>`;

    resultEl.innerHTML = html;
  } catch(e) {
    resultEl.innerHTML = `<div style="background:#fff3f3;border:1px solid #e74c3c;border-radius:8px;padding:16px;color:#c0392b;"><strong>⚠️ 오류:</strong> ${e.message}</div>`;
  }
}

function resetTarot() {
  selectedCards = [];
  updateSelectedDisplay();
  renderDeck();
  document.getElementById('tarot-submit').disabled = true;
  document.getElementById('tarot-result').style.display = 'none';
  document.getElementById('pick-guide').textContent = `카드 ${spreadCount}장을 선택해주세요`;
  window.scrollTo({top:0, behavior:'smooth'});
}

// 초기화
setSpread(1);
