<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 | 오늘의 사주</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --ink:#1a1008; --paper:#f5efe4; --card:#ede5d8; --border:rgba(26,16,8,0.15); --muted:#8a7860; --gold:#c9913a; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Noto Sans KR',sans-serif; background:var(--paper); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .login-box { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:36px 28px; width:100%; max-width:420px; box-shadow:0 8px 32px rgba(26,16,8,0.08); }
    .logo { font-family:'Noto Serif KR',serif; font-size:26px; font-weight:700; text-align:center; margin-bottom:4px; }
    .logo span { color:#c9913a; }
    .sub { font-size:13px; color:var(--muted); text-align:center; margin-bottom:24px; }
    .tab-wrap { display:flex; border-bottom:2px solid var(--border); margin-bottom:20px; }
    .tab { flex:1; padding:10px; background:none; border:none; font-size:14px; font-weight:600; cursor:pointer; color:var(--muted); font-family:'Noto Sans KR',sans-serif; border-bottom:2px solid transparent; margin-bottom:-2px; }
    .tab.active { color:var(--gold); border-bottom-color:var(--gold); }
    .panel { display:none; }
    .panel.active { display:block; }
    .field { margin-bottom:14px; }
    .field label { font-size:12px; font-weight:600; display:block; margin-bottom:6px; color:var(--muted); }
    .field input { width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:var(--paper); font-family:'Noto Sans KR',sans-serif; }
    .field input:focus { outline:none; border-color:var(--gold); }
    .submit-btn { width:100%; padding:14px; background:var(--ink); color:var(--paper); border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Noto Serif KR',serif; margin-top:4px; }
    .submit-btn:hover { background:#2d1f0e; }
    .submit-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .divider { display:flex; align-items:center; gap:10px; margin:18px 0; color:var(--muted); font-size:12px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .google-btn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:#fff; color:#333; font-size:14px; font-weight:600; cursor:pointer; font-family:'Noto Sans KR',sans-serif; }
    .google-btn:hover { box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .back-link { font-size:12px; color:var(--muted); text-decoration:none; display:block; text-align:center; margin-top:16px; }
    .back-link:hover { color:var(--gold); }
    .msg { font-size:13px; padding:10px 14px; border-radius:8px; margin-bottom:12px; display:none; }
    .msg.error { background:#fff3f3; color:#c0392b; border:1px solid #fadbd8; display:block; }
    .msg.success { background:#f0fff4; color:#27ae60; border:1px solid #d5f5e3; display:block; }
    .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--paper); padding:12px 24px; border-radius:24px; font-size:14px; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; }
    .toast.show { opacity:1; }
    .forgot { font-size:12px; color:var(--muted); text-decoration:none; display:block; text-align:right; margin-top:-8px; margin-bottom:12px; }
    .forgot:hover { color:var(--gold); }
  </style>
</head>
<body>
<div class="login-box">
  <div class="logo">오늘의<span>사주</span></div>
  <p class="sub">로그인하고 모든 기능을 이용해보세요</p>

  <!-- 탭 -->
  <div class="tab-wrap">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">로그인</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
  </div>

  <!-- 로그인 패널 -->
  <div class="panel active" id="panel-login">
    <div id="login-msg" class="msg"></div>
    <div class="field">
      <label>이메일</label>
      <input type="email" id="login-email" placeholder="example@email.com"/>
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="login-pw" placeholder="비밀번호 입력"/>
    </div>
    <a href="#" class="forgot" onclick="forgotPassword(); return false;">비밀번호를 잊으셨나요?</a>
    <button class="submit-btn" id="login-btn">로그인</button>
    <div class="divider">또는</div>
    <button class="google-btn" id="google-btn">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      구글로 계속하기
    </button>
  </div>

  <!-- 회원가입 패널 -->
  <div class="panel" id="panel-signup">
    <div id="signup-msg" class="msg"></div>
    <div class="field">
      <label>이름 (닉네임)</label>
      <input type="text" id="signup-name" placeholder="홍길동"/>
    </div>
    <div class="field">
      <label>이메일</label>
      <input type="email" id="signup-email" placeholder="example@email.com"/>
    </div>
    <div class="field">
      <label>비밀번호 (6자 이상)</label>
      <input type="password" id="signup-pw" placeholder="비밀번호 입력"/>
    </div>
    <div class="field">
      <label>비밀번호 확인</label>
      <input type="password" id="signup-pw2" placeholder="비밀번호 재입력"/>
    </div>
    <button class="submit-btn" id="signup-btn">회원가입</button>
    <div class="divider">또는</div>
    <button class="google-btn" id="google-btn2">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      구글로 계속하기
    </button>
  </div>

  <a href="https://saju-today.com" class="back-link">← 로그인 없이 계속하기</a>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function() {
  var sb = window.supabase.createClient(
    'https://kuupemfzqkzinrauhpnd.supabase.co',
    'sb_publishable_4KkeyDEpIaQywyNfD1Eksw_FHJ6zIIx'
  );

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  function showMsg(id, text, type) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
  }
  window.switchTab = switchTab;

  // 로그인
  function doLogin() {
    var email = document.getElementById('login-email').value.trim();
    var pw = document.getElementById('login-pw').value;
    if (!email || !pw) { showMsg('login-msg', '이메일과 비밀번호를 입력해주세요', 'error'); return; }
    var btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = '로그인 중...';
    sb.auth.signInWithPassword({ email: email, password: pw }).then(function(res) {
      if (res.error) {
        showMsg('login-msg', '이메일 또는 비밀번호가 올바르지 않습니다', 'error');
        btn.disabled = false; btn.textContent = '로그인';
      } else {
        var user = res.data.user;
        saveUser(user);
        goNext(user);
      }
    });
  }

  // 회원가입
  function doSignup() {
    var name = document.getElementById('signup-name').value.trim();
    var email = document.getElementById('signup-email').value.trim();
    var pw = document.getElementById('signup-pw').value;
    var pw2 = document.getElementById('signup-pw2').value;
    if (!name) { showMsg('signup-msg', '이름을 입력해주세요', 'error'); return; }
    if (!email) { showMsg('signup-msg', '이메일을 입력해주세요', 'error'); return; }
    if (pw.length < 6) { showMsg('signup-msg', '비밀번호는 6자 이상이어야 합니다', 'error'); return; }
    if (pw !== pw2) { showMsg('signup-msg', '비밀번호가 일치하지 않습니다', 'error'); return; }
    var btn = document.getElementById('signup-btn');
    btn.disabled = true; btn.textContent = '가입 중...';
    sb.auth.signUp({
      email: email,
      password: pw,
      options: { data: { full_name: name } }
    }).then(function(res) {
      if (res.error) {
        showMsg('signup-msg', res.error.message, 'error');
        btn.disabled = false; btn.textContent = '회원가입';
      } else if (res.data.user && res.data.session) {
        // 이메일 인증 불필요한 경우 바로 로그인
        saveUser(res.data.user);
        goNext(res.data.user);
      } else {
        // 이메일 인증 필요
        showMsg('signup-msg', '가입 완료! 이메일을 확인해 인증 링크를 클릭해주세요 📧', 'success');
        btn.disabled = false; btn.textContent = '회원가입';
      }
    });
  }

  // 구글 로그인
  function doGoogle() {
    sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: 'https://saju-today.com/auth/callback' }
    }).then(function(res) {
      if (res.error) showToast('구글 로그인 오류: ' + res.error.message);
    });
  }

  // 비밀번호 찾기
  function forgotPassword() {
    var email = document.getElementById('login-email').value.trim();
    if (!email) { showMsg('login-msg', '이메일을 먼저 입력해주세요', 'error'); return; }
    sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://saju-today.com/auth/callback'
    }).then(function(res) {
      if (res.error) showMsg('login-msg', res.error.message, 'error');
      else showMsg('login-msg', '비밀번호 재설정 이메일을 발송했습니다 📧', 'success');
    });
  }
  window.forgotPassword = forgotPassword;

  function saveUser(user) {
    localStorage.setItem('saju_user', JSON.stringify({
      id: user.id,
      email: user.email,
      name: user.user_metadata && (user.user_metadata.full_name || user.user_metadata.name) || '',
      avatar: user.user_metadata && user.user_metadata.avatar_url || '',
      provider: user.app_metadata && user.app_metadata.provider || 'email',
      membership: 'free'
    }));
  }

  function goNext(user) {
    // 약관 동의 확인
    sb.from('users').select('terms_agreed').eq('id', user.id).single().then(function(res) {
      if (res.data && res.data.terms_agreed) {
        var redirect = sessionStorage.getItem('login_redirect') || 'https://saju-today.com';
        sessionStorage.removeItem('login_redirect');
        window.location.href = redirect;
      } else {
        window.location.href = 'https://saju-today.com/terms';
      }
    });
  }

  // 이벤트 바인딩
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('signup-btn').addEventListener('click', doSignup);
  document.getElementById('google-btn').addEventListener('click', doGoogle);
  document.getElementById('google-btn2').addEventListener('click', doGoogle);

  // Enter 키
  document.getElementById('login-pw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('signup-pw2').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSignup();
  });

  // 이미 로그인된 경우
  sb.auth.getSession().then(function(res) {
    if (res.data && res.data.session) {
      window.location.href = 'https://saju-today.com';
    }
  });
})();
</script>

    <a href="mailto:contact@saju-today.com" style="color:#5c5445;text-decoration:none;margin:0 8px;">문의하기</a>
  </div>
  <div>상호: 비즈글로벌 · 대표자: 정지훈 · 사업자등록번호: 760-40-01387</div>

</div>
</body>
</html>
